services:
  port-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: port-dashboard
    ports:
      - "5001:5001"
    environment:
      PORT_DASHBOARD_HOST: 0.0.0.0
      PORT_DASHBOARD_PORT: 5001
      INCLUDE_DOCKER_CONTAINERS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
