services:
  port-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: port-dashboard
    ports:
      - "127.0.0.1:5001:5001"
    env_file:
      - .env
    environment:
      PORT_DASHBOARD_HOST: 0.0.0.0
      PORT_DASHBOARD_PORT: 5001
      PORT_DASHBOARD_MODE: docker
      INCLUDE_DOCKER_CONTAINERS: ${INCLUDE_DOCKER_CONTAINERS:-0}
      PORT_DASHBOARD_ENABLE_ACTIONS: ${PORT_DASHBOARD_ENABLE_ACTIONS:-0}
    # SECURITY: docker socket is intentionally not mounted by default.
    # If you explicitly need docker container visibility/control, uncomment below
    # and keep this app on a private network only.
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
